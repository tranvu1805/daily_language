name: Deploy Android Internal

on:
  push:
    branches:
      - master

concurrency:
  group: deploy-android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SA_EMAIL }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.2'
          channel: stable
          cache: true
          cache-key: 'flutter-:os:-:channel:-:version:-:arch:-:hash:'
          cache-path: '${{ runner.tool_cache }}/flutter'

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool/
          key: pub-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: android

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      - name: Create key.properties
        run: |
          printf 'storeFile=upload-keystore.jks\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n' \
            "${{ secrets.KEYSTORE_STORE_PASSWORD }}" \
            "${{ secrets.KEYSTORE_KEY_ALIAS }}" \
            "${{ secrets.KEYSTORE_KEY_PASSWORD }}" \
            > android/key.properties

      - name: Flutter pub get
        run: flutter pub get

      # ── Hỏi Play Store version code tiếp theo ────────────────
      - name: Get next version code
        id: version
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}
        run: |
          cd android
          # Chạy lane, lấy dòng có NEXT_VERSION_CODE=
          NEXT=$(bundle exec fastlane next_version_code \
            | grep "NEXT_VERSION_CODE=" \
            | tail -1 \
            | sed 's/.*NEXT_VERSION_CODE=//')
          echo "code=$NEXT" >> $GITHUB_OUTPUT
          echo "Next version code: $NEXT"

      # ── Build AAB với đúng version code ──────────────────────
      - name: Build AAB
        run: |
          flutter build appbundle \
            --release \
            --build-number=${{ steps.version.outputs.code }}

      # ── Upload qua Fastlane ───────────────────────────────────
      - name: Deploy via Fastlane
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}
        run: |
          cd android
          bundle exec fastlane deploy_internal

      - name: Cleanup
        if: always()
        run: |
          rm -f android/app/upload-keystore.jks
          rm -f android/key.properties